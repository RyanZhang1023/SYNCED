<!DOCTYPE html>
<html>
<head>
    <title>SYNCED</title>
    <link rel="stylesheet" type="text/css" href="./css/activation_overlay.css">
</head>
<body>
    <h2>🎵 SYNCED</h2>

    <input type="text" id="searchInput" placeholder="Search song..." />
    <button onclick="searchSong()">Search</button>

    <ul id="searchResults"></ul>

    <h3>Playlist</h3>
    <button onclick="toggleMode()">Toggle Order/Random</button>
    <ul id="playlist"></ul>

    <audio id="audio" controls></audio>
    <button onclick="playSong()">Play</button>
    <button onclick="pauseSong()">Pause</button>

    <div id="activation-overlay">
      <div>
        Tap anywhere on the screen<br>to enable sound
      </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script type="text/javascript" src="./js/main.js"></script>
</body>
</html>
